name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Validate tag vs package.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm check

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Package build artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf "artifacts/rodocs-mcp-${GITHUB_REF_NAME}.tar.gz" -C dist .
          echo "artifact=artifacts/rodocs-mcp-${GITHUB_REF_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.2.0
        with:
          subject-path: |
            ./dist
            ${{ steps.package.outputs.artifact }}

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            echo "Release ${tag} exists. Updating..."
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --notes-file RELEASE_NOTES.md
          else
            echo "Creating release ${tag}..."
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --notes-file RELEASE_NOTES.md \
              "${{ steps.package.outputs.artifact }}"
          fi
